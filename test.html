<style>
  :root{
    --cellW:45px;
    --cellH:45px;
    --radius:10px;
    --thermo: linear-gradient(90deg,
      rgb(25,95,255) 0%,
      rgb(85,55,230) 34%,
      rgb(130,45,255) 55%,
      rgb(220,60,120) 78%,
      rgb(255,75,55) 100%
    );
  }
  body{ margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; background:#fff; }
  .stage{
    position:relative;
    width:min(980px, 96vw);
    aspect-ratio: 1000 / 700;
    margin:18px auto;
    border:1px solid #e5e7eb;
    border-radius:18px;
    overflow:hidden;
  }
  .stage::before{
    content:"";
    position:absolute; inset:0;
    background:var(--thermo);
    opacity:.20;
    pointer-events:none;
  }
  svg{ position:absolute; inset:0; width:100%; height:100%; }
  path{ stroke:rgba(17,24,39,.85); stroke-width:6; fill:none; stroke-linecap:round; stroke-linejoin:round; }
  .cell{
    position:absolute;
    width:var(--cellW);
    height:var(--cellH);
    border-radius:var(--radius);
    border:2px solid rgba(17,24,39,.65);
    background: rgba(255,255,255,.70);
    display:grid;
    place-items:center;
    font-weight:850;
    user-select:none;
  }
  .cell::after{
    content:"";
    position:absolute;
    right:-2px; top:9px; bottom:9px;
    width:2px;
    background: rgba(17,24,39,.25);
    border-radius:2px;
    opacity:.6;
  }
  .txt{ font-size:14px; letter-spacing:.5px; }
  .barred .x1, .barred .x2{
    position:absolute;
    inset:10px;
    border-top:3px solid rgba(17,24,39,.75);
    transform-origin:center;
    border-radius:3px;
  }
  .barred .x1{ transform:rotate(35deg); }
  .barred .x2{ transform:rotate(-35deg); }
</style>
</head>
